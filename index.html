<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>社会学研究所 - 北大考研通关之路</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        :root {
            --cream-yellow: #FFF8E7;
            --lemon-yellow: #FFD93D;
            --wheat-gold: #F5C242;
            --caramel-brown: #8B5A2B;
            --cheese-orange: #FFAA5C;
            --mint-green: #98D8AA;
            --lavender: #C8A2C8;
            --soft-white: #FFFFFF;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            background-color: var(--cream-yellow);
            background-image: radial-gradient(var(--lemon-yellow) 1px, transparent 1px);
            background-size: 20px 20px;
            color: var(--caramel-brown);
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            margin: 0; padding: 0;
            overflow-x: hidden;
        }
        .status-bar {
            background: var(--soft-white);
            padding: 12px 15px;
            display: flex;
            justify-content: space-around;
            border-bottom: 5px solid var(--caramel-brown);
            position: sticky; top: 0; z-index: 100;
        }
        .resource-item { font-size: 15px; font-weight: bold; display: flex; align-items: center; gap: 5px; }
        #app { padding: 20px; padding-bottom: 100px; max-width: 600px; margin: 0 auto; }
        .npc-box {
            background: var(--soft-white);
            border: 4px solid var(--caramel-brown);
            border-radius: 25px;
            padding: 15px; margin: 10px 0 25px 0;
            display: flex; align-items: center; gap: 15px;
            box-shadow: 0 6px 0 var(--caramel-brown);
        }
        .npc-avatar {
            font-size: 40px; background: var(--lemon-yellow);
            width: 70px; height: 70px; min-width: 70px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 50%; border: 3px solid var(--caramel-brown);
        }
        .nav-bar {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: var(--soft-white); height: 75px;
            display: flex; justify-content: space-around; align-items: center;
            border-top: 5px solid var(--caramel-brown); z-index: 1000;
        }
        .nav-item { text-align: center; font-size: 12px; cursor: pointer; font-weight: bold; }
        .nav-icon { font-size: 26px; display: block; margin-bottom: 2px; }
        .page-section { display: none; }
        .page-section.active { display: block; }
        .day-box {
            aspect-ratio: 1/1; border: 4px solid var(--caramel-brown);
            border-radius: 18px; display: flex; align-items: center;
            justify-content: center; font-size: 20px; font-weight: 900;
            cursor: pointer; box-shadow: 0 4px 0 var(--caramel-brown);
            transition: all 0.2s;
        }
        .day-box:active { transform: translateY(4px); box-shadow: none; }
        .btn-primary {
            background: var(--lemon-yellow); border: 3px solid var(--caramel-brown);
            padding: 12px 20px; border-radius: 20px; font-weight: bold;
            box-shadow: 0 5px 0 var(--caramel-brown); cursor: pointer;
        }
        h2 { text-align: center; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div class="status-bar">
        <div class="resource-item">💰 <span id="money">--</span></div>
        <div class="resource-item">📚 <span id="knowledge">--</span></div>
        <div class="resource-item">⭐ <span id="prestige">--</span></div>
        <div class="resource-item">🎯 <span id="level">--</span></div>
    </div>

    <div id="app">
        <section id="home" class="page-section active">
            <div class="npc-box">
                <div class="npc-avatar" id="npc-emoji">🥐</div>
                <div class="npc-content">
                    <strong id="npc-name">研研所长</strong>
                    <p id="npc-text" style="margin: 5px 0 0 0; font-size: 14px;">加载中...</p>
                </div>
            </div>
            <div id="day-grid" style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px;"></div>
        </section>

        <section id="wiki" class="page-section">
            <h2>📖 社会学百科</h2>
            <div id="concept-list" style="display: flex; flex-direction: column; gap: 10px;"></div>
        </section>

        <section id="build" class="page-section">
            <h2>🏛️ 研究所设施</h2>
            <div id="facility-list"></div>
        </section>

        <section id="achieve" class="page-section">
            <h2>🏆 荣誉室</h2>
            <p style="text-align:center; opacity: 0.6;">正在统计你的学术成果...</p>
        </section>
    </div>

    <nav class="nav-bar">
        <div class="nav-item" onclick="switchPage('home')"><span class="nav-icon">🏠</span>首页</div>
        <div class="nav-item" onclick="switchPage('wiki')"><span class="nav-icon">📚</span>百科</div>
        <div class="nav-item" onclick="switchPage('build')"><span class="nav-icon">🔬</span>实验室</div>
        <div class="nav-item" onclick="switchPage('achieve')"><span class="nav-icon">🏆</span>成就</div>
    </nav>

    <script>
        const Game = {
            state: {
                money: 1000,
                knowledge: 0,
                prestige: 0,
                level: 1,
                unlockedDays: 1,
                title: "学徒",
                completedTasks: [],
                unlockedConcepts: [],
                facilities: {}
            },

            init() {
                this.load();
                this.updateUI();
                setTimeout(() => {
                    this.renderDayGrid();
                    this.initNPC();
                }, 100);
            },

            initNPC() {
                if(typeof GAME_DATA !== 'undefined') {
                    const director = GAME_DATA.roles.director;
                    document.getElementById('npc-name').innerText = director.name;
                    document.getElementById('npc-emoji').innerText = director.emoji;
                    document.getElementById('npc-text').innerText = director.intro;
                }
            },

            updateUI() {
                document.getElementById('money').innerText = this.state.money;
                document.getElementById('knowledge').innerText = this.state.knowledge;
                document.getElementById('prestige').innerText = this.state.prestige;
                document.getElementById('level').innerText = "Lv." + this.state.level + " " + this.state.title;
            },

            renderDayGrid() {
                const grid = document.getElementById('day-grid');
                if(!grid) return;
                grid.innerHTML = '';
                for (let i = 1; i <= 28; i++) {
                    const box = document.createElement('div');
                    box.className = 'day-box';
                    const isUnlocked = i <= this.state.unlockedDays;
                    const isCompleted = this.state.completedTasks.includes(i);
                    box.style.backgroundColor = isCompleted ? 'var(--mint-green)' : (isUnlocked ? 'var(--lemon-yellow)' : '#E0E0E0');
                    box.style.opacity = isUnlocked ? '1' : '0.5';
                    box.innerText = i;
                    box.onclick = () => {
                        if(typeof GameEngine !== 'undefined') GameEngine.initTask(i);
                    };
                    grid.appendChild(box);
                }
            },

            switchPage(pageId) {
                document.querySelectorAll('.page-section').forEach(s => s.classList.remove('active'));
                const target = document.getElementById(pageId);
                if(target) target.classList.add('active');
                
                // 刷新特定页面内容
                if (pageId === 'build' && typeof GameEngine !== 'undefined') GameEngine.renderFacilities();
                if (pageId === 'wiki' && typeof GameEngine !== 'undefined') GameEngine.renderWiki();
                
                gsap.from(`#${pageId}`, { y: 20, opacity: 0, duration: 0.4 });
            },

            save() { localStorage.setItem('soc_res_save_v2', JSON.stringify(this.state)); },
            load() {
                const saved = localStorage.getItem('soc_res_save_v2');
                if(saved) this.state = Object.assign(this.state, JSON.parse(saved));
            }
        };

        window.switchPage = (id) => Game.switchPage(id);
        window.addEventListener('DOMContentLoaded', () => Game.init());
    </script>

    <script src="data.js"></script>
    <script src="game.js"></script>
</body>
</html>
