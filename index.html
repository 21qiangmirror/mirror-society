<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>镜中社会 - 甜品研究局 (Deluxe V1.2)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        :root {
            --biscuit: #FFF3E0;
            --cream: #FFFAF0;
            --chocolate: #5D4037;
            --strawberry: #FF80AB;
            --mint: #A5D6A7;
            --jam: #E91E63;
        }

        /* 1. 视觉增强：糖霜背景 */
        body {
            background-color: var(--biscuit);
            background-image: radial-gradient(var(--cream) 20%, transparent 20%);
            background-size: 30px 30px; /* 像洒满糖粉的桌布 */
            color: var(--chocolate);
            font-family: 'Comic Sans MS', cursive, sans-serif;
            margin: 0; padding-bottom: 50px;
            display: flex; flex-direction: column; align-items: center;
        }

        /* 2. 更加可爱的顶部栏 */
        .header-bar {
            width: 100%; background: rgba(255, 248, 225, 0.9);
            padding: 20px 0; display: flex; justify-content: center; gap: 15px;
            border-bottom: 6px solid var(--chocolate); position: sticky; top: 0; z-index: 100;
        }

        .stat-badge {
            background: var(--cream); border: 3px solid var(--chocolate);
            padding: 8px 18px; border-radius: 25px; font-weight: bold;
            box-shadow: 3px 3px 0 var(--chocolate); font-size: 0.9rem;
        }

        /* 3. 豪华版饼干卡片 */
        .grid-layout {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px; width: 90%; max-width: 1100px; margin-top: 40px;
        }

        .card {
            background: var(--cream); border: 6px solid #D7CCC8; border-radius: 40px;
            padding: 30px; text-align: center; cursor: pointer;
            box-shadow: 0 12px 0 #BCAAA4; transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative; overflow: hidden;
        }

        .card:hover { transform: translateY(-8px); box-shadow: 0 18px 0 #BCAAA4; }
        .card:active { transform: translateY(4px); box-shadow: 0 4px 0 #BCAAA4; }

        .card h3 { margin: 15px 0 10px; font-size: 1.4rem; }
        .card p { font-size: 0.9rem; opacity: 0.8; }

        /* 4. 游戏窗口美化 */
        #game-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(93, 64, 55, 0.8); display: none;
            justify-content: center; align-items: center; z-index: 1000;
        }

        .game-window {
            background: var(--cream); width: 90%; max-width: 550px;
            padding: 40px; border-radius: 50px; border: 8px solid var(--chocolate);
            box-shadow: 0 20px 0 var(--chocolate); position: relative;
        }

        .option-btn {
            display: block; width: 100%; padding: 15px; margin: 10px 0;
            background: white; border: 3px solid var(--chocolate);
            border-radius: 20px; cursor: pointer; font-weight: bold;
            transition: all 0.2s;
        }
        .option-btn:hover { background: var(--mint); transform: scale(1.02); }

        textarea {
            width: 100%; height: 120px; border-radius: 20px; border: 3px solid var(--chocolate);
            padding: 15px; margin: 10px 0; font-family: inherit;
        }

        .progress-jam {
            height: 10px; background: #eee; border-radius: 5px; margin-top: 10px; overflow: hidden;
        }
        .jam-fill { height: 100%; background: var(--jam); width: 0%; transition: width 0.5s; }
    </style>
</head>
<body>

    <div class="header-bar">
        <div class="stat-badge">🏅 <span id="level">学徒</span></div>
        <div class="stat-badge">🪙 <span id="coins">100</span></div>
        <div class="stat-badge">🎓 北大进度: <span id="pku">0</span>%</div>
    </div>

    <div style="text-align: center; margin-top: 40px;">
        <h1 style="font-size: 3rem; text-shadow: 3px 3px 0 white;">🍪 镜中社会</h1>
        <p style="background: white; display: inline-block; padding: 5px 20px; border-radius: 20px; border: 2px solid var(--chocolate);">
            北大社会学考研·模拟经营学习站
        </p>
    </div>

    <div class="grid-layout">
        <div class="card" onclick="playGame('theory')">
            <div style="font-size:60px">📖</div>
            <h3>糖霜档案馆</h3>
            <p>与马克思、韦伯等饼干学者对话，精准掌握古典理论脉络。</p>
            <div class="progress-jam"><div class="jam-fill" id="p1"></div></div>
        </div>

        <div class="card" onclick="playGame('method')">
            <div style="font-size:60px">🧪</div>
            <h3>焦糖实验室</h3>
            <p>从选题到抽样，烤制严谨的研究设计，对标专二大题。</p>
            <div class="progress-jam"><div class="jam-fill" id="p2"></div></div>
        </div>

        <div class="card" onclick="playGame('field')">
            <div style="font-size:60px">🍹</div>
            <h3>果汁情报站</h3>
            <p>进入田野进行模拟访谈，提取最高纯度的资料果汁。</p>
            <div class="progress-jam"><div class="jam-fill" id="p3"></div></div>
        </div>

        <div class="card" onclick="playGame('exam')">
            <div style="font-size:60px">🏛️</div>
            <h3>烘焙考核厅</h3>
            <p>模拟北大阅卷现场，进行计时真题挑战与逻辑诊断。</p>
            <div class="progress-jam"><div class="jam-fill" id="p4"></div></div>
        </div>
    </div>

    <div id="game-overlay">
        <div class="game-window">
            <div id="game-body"></div>
            <button onclick="closeUI()" style="margin-top:20px; background:none; border:none; cursor:pointer; color:var(--chocolate); text-decoration:underline;">[返回主基地]</button>
        </div>
    </div>

    <script>
        // 游戏数据库（内容扩充）
        const Database = {
            theory: [
                { q: "马克思认为，劳动产品作为一种异己的力量与生产者对立，这被称为？", a: ["异化", "剥削", "物化"], right: 0 },
                { q: "韦伯提出的理想类型中，现代科层制的核心逻辑是？", a: ["传统权威", "工具理性", "价值理性"], right: 1 }
            ],
            method: [
                { q: "要研究“外卖骑手”这一高流动性群体，最适合的抽样方法是？", a: ["简单随机抽样", "雪球抽样", "配额抽样"], right: 1 },
                { q: "在问卷设计中，‘您是否支持这种既违法又缺德的行为？’违反了什么原则？", a: ["定义明确", "价值中立", "简短性"], right: 1 }
            ]
        };

        let state = { coins: 100, pku: 0, theoryIdx: 0, methodIdx: 0 };

        function updateDisplay() {
            document.getElementById('coins').innerText = state.coins;
            document.getElementById('pku').innerText = state.pku;
            document.getElementById('p1').style.width = (state.theoryIdx * 50) + "%";
            document.getElementById('p2').style.width = (state.methodIdx * 50) + "%";
        }

        function playGame(type) {
            const body = document.getElementById('game-body');
            document.getElementById('game-overlay').style.display = 'flex';
            
            if(type === 'theory' || type === 'method') {
                const data = Database[type][type === 'theory' ? state.theoryIdx : state.methodIdx];
                if(!data) {
                    body.innerHTML = "<h3>🌟 关卡已满</h3><p>你已经掌握了这部分的甜点配方！</p>";
                    return;
                }
                body.innerHTML = `<h3>${type === 'theory' ? '📖 理论挑战' : '🧪 方法实验'}</h3><p>${data.q}</p>`;
                data.a.forEach((opt, i) => {
                    body.innerHTML += `<button class="option-btn" onclick="checkAnswer(${i}, ${data.right}, '${type}')">${opt}</button>`;
                });
            } else if(type === 'field') {
                body.innerHTML = "<h3>🍹 访谈模拟</h3><p>被访者：“那会儿日子苦，但心齐。”</p>" +
                                 "<button class='option-btn' onclick='win(20, 5)'>“能讲讲‘心齐’的具体表现吗？” (追问)</button>" +
                                 "<button class='option-btn' onclick='win(5, 1)'>“那会儿苦到什么程度？” (表面提问)</button>";
            } else {
                body.innerHTML = "<h3>🏛️ 考核厅</h3><p>【名词解释】差序格局</p><textarea placeholder='输入你的论述...'></textarea>" +
                                 "<button class='option-btn' style='background:var(--strawberry); color:white;' onclick='win(50, 10)'>提交考卷</button>";
            }
            gsap.from(".game-window", { scale: 0.7, duration: 0.4, ease: "back.out" });
        }

        function checkAnswer(idx, right, type) {
            if(idx === right) {
                alert("🍭 答对了！饼干味道极佳。");
                state.coins += 20; state.pku += 5;
                if(type === 'theory') state.theoryIdx++; else state.methodIdx++;
                updateDisplay(); closeUI();
            } else {
                alert("💔 哎呀，配方不对，饼干碎了...");
            }
        }

        function win(c, p) {
            alert(`✨ 考核通过！糖霜币+${c}，北大进度+${p}%`);
            state.coins += c; state.pku += p;
            updateDisplay(); closeUI();
        }

        function closeUI() { document.getElementById('game-overlay').style.display = 'none'; }
        
        updateDisplay();
    </script>
</body>
</html>
